name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Create Release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" custom_components/fmi_solar_forecast/manifest.json

      - name: Create ZIP file
        run: |
          cd custom_components/fmi_solar_forecast/
          zip -r ../../fmi_solar_forecast.zip . -x '.*'

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./fmi_solar_forecast.zip

      - name: Update HACS repository
        run: |
          echo "Release ${{ steps.version.outputs.version }} created with ZIP file"
          echo "HACS will automatically detect this release"
